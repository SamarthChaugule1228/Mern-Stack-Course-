<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Practice</title>
</head>

<body>
    <h1>Contact Us form </h1>
    <form action="" id="myform" name="myform1">
        <label for="name">Name :</label>
        <input type="text" placeholder="Enter Your Name " id="name">
        <br>
        <label for="email"> email:</label>
        <input type="email" placeholder="Enter your Email" name="email" id="email">
        <br>
        <br>
        <label for="Contact">Contact:</label>
        <input type="number" name="Contact" id="contact">
        <br>
        <label for="gender">Gender:</label>
        <select name="gender" id="gen">
            <option value="Male">Male</option>
            <option value="facere">Female </option>
            <br>
        </select>
        <br>
        <label for="dat">Date: </label>
        <input type="date" id="date" name="dat">
        <br>
        <h4>Rating</h4>
        <input type="radio" id="rating1" name="rating">
        <label for="rating1">Rating 1</label>
        <input type="radio" id="rating2" name="rating">
        <label for="rating2">Rating 2</label>
        <input type="radio" id="rating3" name="rating">
        <label for="rating3">Rating 3</label>
        <br>

        <label for="msg">Enter your message</label>
        <textarea placeholder="Enter Your Message"></textarea>
        <input type="submit" value="Submit" name="Submit" id="Submit ">
    </form>
</body>

</html>
